# Alembic Configuration File — VIVAMENTE 360º
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts (relativo ao diretório onde alembic é executado)
script_location = alembic

# Template de nome para arquivos de migração
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Encode para leitura de arquivos .mako
# source_encoding = utf-8-sig

# Timezone para os timestamps nas mensagens de migração
# timezone =

# Máximo de revisões para exibir no histórico
# truncate_slug_length = 40

# A URL é sobrescrita em env.py a partir das settings da aplicação.
# Deixar placeholder para evitar credenciais em arquivo de configuração.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/vivamente360

[post_write_hooks]
# Hooks de pós-escrita — descomente para aplicar ruff automaticamente às migrations
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
