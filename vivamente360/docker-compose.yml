version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vivamente360_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vivamente360
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vivamente360"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer (UI para PostgreSQL) ───────────────────────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: vivamente360_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      postgres:
        condition: service_healthy

  # ── API FastAPI ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vivamente360_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vivamente360
      ENV: development
      DEBUG: "true"
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info

volumes:
  postgres_data:
    driver: local
